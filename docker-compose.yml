services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bconnect
      POSTGRES_PASSWORD: bconnect
      POSTGRES_DB: bconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port — backend reaches postgres via Docker network (postgres:5432).
    # Avoids conflict if the reviewer already has local Postgres on :5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bconnect:bconnect@postgres:5432/bconnect
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
