services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bconnect
      POSTGRES_PASSWORD: bconnect
      POSTGRES_DB: bconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port — backend reaches postgres via Docker network (postgres:5432).
    # Avoids conflict if the device already has local Postgres on :5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bconnect:bconnect@postgres:5432/bconnect
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    command: sh -c "npm run preview -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
